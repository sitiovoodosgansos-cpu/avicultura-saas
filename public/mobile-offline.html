<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ornabird | Sem conexão</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(circle at top, #e6f4ef, #f8fafc 60%);
        color: #0f172a;
      }
      .card {
        width: min(92vw, 420px);
        border-radius: 16px;
        background: #ffffff;
        border: 1px solid #dbe5ea;
        padding: 24px;
        box-shadow: 0 14px 32px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      p {
        margin: 0 0 16px;
        color: #475569;
        line-height: 1.45;
      }
      button {
        border: 0;
        border-radius: 10px;
        background: #0f766e;
        color: #ffffff;
        font-weight: 600;
        padding: 10px 14px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <article class="card">
      <h1>Sem conexão</h1>
      <p>
        Não foi possível abrir o Ornabird agora. Verifique internet/Wi-Fi e toque em tentar novamente.
      </p>
      <button type="button" onclick="window.location.reload()">Tentar novamente</button>
    </article>
  </body>
</html>
