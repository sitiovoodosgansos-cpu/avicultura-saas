name: Mobile Preview Check

on:
  push:
    branches:
      - mobile/**
  pull_request:

jobs:
  mobile-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Capacitor Android sync (preview safety)
        env:
          ORNABIRD_MOBILE_URL: https://ornabird.app
        run: npm run mobile:android:sync

